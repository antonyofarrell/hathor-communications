# Sveltia CMS configuration
# Docs: https://github.com/sveltia/sveltia-cms

backend:
  name: github
  # TODO(per-project): point this at THIS site's own repo (one repo per client).
  repo: antonyofarrell/hathor-communications
  branch: main
  # Sveltia needs an OAuth proxy (it omits Decap's Git Gateway).
  # The simplest free option is the Sveltia auth worker on Cloudflare.
  # See README → "Connecting the CMS (auth)".
  # base_url: https://your-oauth-worker.workers.dev

# Set to true ONLY for local testing with `npm run cms:proxy`.
# Must be false (or removed) in production.
local_backend: false

# Where uploaded images are written / served from.
media_folder: src/assets/uploads
public_folder: /uploads

# ── Internationalization ──────────────────────────────────────
# multiple_folders writes <folder>/<locale>/<slug> — i.e. it creates
# src/content/pages/en/about.md, es/about.md, fr/about.md, which is
# exactly the tree Astro's glob loader reads. Editors see one entry
# with three language tabs; Sveltia links them automatically.
i18n:
  structure: multiple_folders
  locales: [en, es, fr]
  default_locale: en

collections:
  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: true
    # Keep the slug identical across languages so the site's language
    # switcher is a simple URL-segment swap. (Drop the | localize filter
    # below if you later want per-language slugs.)
    slug: "{{slug}}"
    i18n: true
    fields:
      - { label: Title, name: title, widget: string, i18n: true }
      - {
          label: "Meta description",
          name: description,
          widget: string,
          required: false,
          i18n: true,
        }
      - { label: Body, name: body, widget: markdown, i18n: true }
